{% extends "tickets/base.html" %}

{% block title %}Excluir Ticket{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem"></i>
        <h5 class="mt-3">Confirmar exclusão</h5>
        <p class="text-muted">
          Tem certeza que deseja excluir o ticket<br />
          <strong>#{{ ticket.pk }} — {{ ticket.titulo }}</strong>?
        </p>
        <form method="post" class="d-flex justify-content-center gap-2">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i>Sim, excluir
          </button>
          <a href="{% url 'ticket-list' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
